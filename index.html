<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherlyWave</title>

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Dark Mode Support -->
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-[#fcd34d] via-[#60a5fa] to-[#9333ea] dark:from-[#0f172a] dark:via-[#1e293b] dark:to-[#1e293b] min-h-screen flex items-center justify-center text-white transition-all">

    <!-- Dark Mode Toggle -->
    <button
      onclick="toggleTheme()"
      class="absolute top-4 right-4 bg-white text-black dark:bg-gray-800 dark:text-white px-3 py-1 rounded shadow"
    >
      Toggle Theme
    </button>

    <div class="w-full max-w-md text-center glass-card p-6 rounded-2xl shadow-2xl">
      <!-- Logo -->
      <img
        src="https://api.dicebear.com/7.x/icons/svg?seed=weatherlywave&backgroundColor=12f7ff&icon=cloud&radius=50"
        alt="WeatherlyWave Logo"
        class="w-16 h-16 mx-auto mb-2 rounded-full"
      />

      <!-- Title -->
      <h1 class="text-3xl font-bold mb-1 text-white drop-shadow">🌊 WeatherlyWave</h1>
      <p class="text-sm text-gray-200 mb-6 italic">Ride the wave of real-time weather updates</p>

      <!-- Input -->
      <input
        id="cityInput"
        type="text"
        placeholder="Enter city name"
        class="w-full p-3 rounded-lg text-black mb-4 focus:outline-none shadow"
      />

      <!-- Button -->
      <button
        onclick="getWeather()"
        class="bg-white text-black font-semibold py-2 px-6 rounded-lg hover:bg-[#12f7ff] transition-all mb-6 shadow"
      >
        Search
      </button>

      <!-- Weather Result -->
      <div id="weatherResult" class="hidden mt-4">
        <h2 class="text-2xl font-semibold mb-2" id="cityName"></h2>

        <!-- Animated Icon -->
        <div class="flex justify-center mb-2">
          <img id="weatherIcon" class="w-24 h-24 animate-pulse" />
        </div>

        <p class="text-lg capitalize mb-1" id="description"></p>
        <p class="text-xl font-bold text-white" id="temperature"></p>
        <p class="text-base text-gray-200" id="humidity"></p>
      </div>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
