<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherWave</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet" />
  </head>
  <body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md text-center">
      <h1 class="text-3xl font-bold mb-4 text-cyan-400">🌦 Weather App</h1>
      <input
        id="cityInput"
        type="text"
        placeholder="Enter city name"
        class="w-full p-3 rounded-lg text-black mb-4 focus:outline-none"
      />
      <button
        onclick="getWeather()"
        class="bg-cyan-500 hover:bg-cyan-600 text-white font-semibold py-2 px-6 rounded-lg mb-6"
      >
        Search
      </button>
      <div id="weatherResult" class="bg-gray-800 p-6 rounded-lg hidden">
        <h2 class="text-2xl font-semibold mb-2" id="cityName"></h2>
        <img id="weatherIcon" class="mx-auto mb-2 w-20 h-20" />
        <p class="text-lg" id="description"></p>
        <p class="text-xl font-bold" id="temperature"></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
