<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <meta name="theme-color" content="#3b82f6" />
  <title>WeatherlyWave - Weather App</title>
  
  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --vh: 100vh;
    }
    body {
      min-height: var(--vh);
      height: 100vh;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      background-size: cover;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
    }
    .dark body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
    
    .weather-card {
      width: 100%;
      max-width: 400px;
      height: 100%;
      max-height: 100vh;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
  
    @media (min-width: 640px) {
      .weather-card {
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        height: auto;
        max-height: 90vh;
      }
    }
    .temp-display {
      font-size: 3rem;
      line-height: 1;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }
    .forecast-item {
      transition: all 0.2s ease;
    }
    .forecast-item:hover {
      transform: translateY(-3px);
    }

    /* Responsive styles */
    @media (max-width: 640px) {
      .weather-card {
        max-width: 95%;
      }
      .temp-display {
        font-size: 2.5rem;
      }
    }
    /* Add to your style section */
    #voiceSearchBtn {
      transition: all 0.2s ease;
    }
    #voiceSearchBtn:hover {
      transform: scale(1.05);
    }
    #voiceSearchBtn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body id="body" class="transition-all duration-300">
  <div class="weather-card p-6">
    <!-- Header with search -->
    <div class="flex items-center justify-between mb-4">
      <img src="icons/icon-192.png" alt="WeatherlyWave Logo" class="w-8 h-8 mr-2 rounded" />
      <h1 class="text-xl font-bold text-gray-800 dark:text-white">WeatherlyWave</h1>
      <button id="themeToggle" class="p-1 rounded-full bg-white/20 hover:bg-white/30 transition">
        <i id="themeIcon" class="fas fa-moon moon-icon"></i>
      </button>
    </div>
    
    <div class="relative mb-4 flex items-center">
      <input id="cityInput" type="text" placeholder="Search city..."
             class="search-input w-full p-3 pl-10 text-sm rounded-lg bg-white/20 placeholder-gray-500 text-gray-800 border border-gray-300 focus:outline-none focus:border-blue-500 transition" />
      <i class="fas fa-search absolute left-3 top-3 text-gray-500"></i>
      <button id="voiceSearchBtn" class="ml-2 p-2 rounded-full bg-blue-100 hover:bg-blue-200 text-blue-600 transition">
        <i class="fas fa-microphone"></i>
      </button>
      <div id="suggestions" class="hidden absolute z-20 w-full mt-1 bg-white dark:bg-gray-800 rounded-lg shadow-xl border border-gray-200 dark:border-gray-700 top-full"></div>
    </div>
    
    <p class="text-xs text-gray-600 dark:text-gray-300" id="datetime"></p>
    
    <!-- Main weather display -->
    <div id="weatherInfo" class="hidden mt-4">
      <div class="flex justify-between items-center mb-2">
        <div>
          <h2 id="cityName" class="text-2xl font-bold text-gray-800 dark:text-white"></h2>
          <p id="description" class="capitalize text-sm text-gray-600 dark:text-gray-300"></p>
        </div>
        <img id="weatherIcon" class="w-16 h-16" src="" alt="Weather Icon" />
      </div>
      
      <div class="flex flex-col sm:flex-row items-center justify-between mb-4">
        <div class="temp-display font-bold" id="temp"></div>
        <div class="grid grid-cols-2 gap-2 text-xs sm:text-sm w-full sm:w-auto">
          <div class="flex items-center gap-2">
            <i class="fas fa-wind text-blue-500"></i>
            <span id="wind" class="text-gray-700 dark:text-gray-300"></span>
          </div>
          <div class="flex items-center gap-2">
            <i class="fas fa-tint text-blue-500"></i>
            <span id="humidity" class="text-gray-700 dark:text-gray-300"></span>
          </div>
          <div class="flex items-center gap-2">
            <i class="fas fa-tachometer-alt text-blue-500"></i>
            <span id="pressure" class="text-gray-700 dark:text-gray-300"></span>
          </div>
          <div class="flex items-center gap-2">
            <i class="fas fa-eye text-blue-500"></i>
            <span id="visibility" class="text-gray-700 dark:text-gray-300"></span>
          </div>
        </div>
      </div>
      
      <!-- Forecast cards -->
      <div class="mb-4">
        <h3 class="text-base font-semibold text-gray-800 dark:text-white mb-2">5-Day Forecast</h3>
        <div id="forecast" class="grid grid-cols-5 gap-2">
          <!-- Forecast items will be inserted here by JavaScript -->
        </div>
      </div>
      
      <!-- Location button -->
      <button onclick="navigator.geolocation.getCurrentPosition(getWeatherByCoords)"
              class="w-full py-2 px-4 bg-blue-500 hover:bg-blue-600 rounded-lg text-white font-medium flex items-center justify-center gap-2 transition">
        <i class="fas fa-location-arrow"></i>
        Use my current location
      </button>
    </div>
    
    <!-- Loading state -->
    <div id="loader" class="hidden flex items-center justify-center p-6">
      <div class="flex flex-col items-center">
        <svg class="animate-spin h-6 w-6 text-blue-600 mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        <span class="text-xs text-gray-500 dark:text-gray-400">Fetching weather data...</span>
      </div>
    </div>
    
    <!-- Error state -->
    <div id="errorMsg" class="hidden p-3 bg-red-50 dark:bg-red-900/20 rounded-lg text-red-600 dark:text-red-300 text-center my-4">
      <div class="flex items-center justify-center gap-2">
        <i class="fas fa-exclamation-circle"></i>
        <span class="text-xs">City not found. Please try another location.</span>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="p-3 border-t border-gray-100 dark:border-slate-700 text-center text-xs text-gray-500 dark:text-gray-400">
      <p>Built by <a href="https://dineshkumar-pro.web.app/" class="text-blue-500 hover:underline" target="_blank">DineshKumarV</a></p>
    </div>
  </div>
  
  <script src="script.js" defer></script>
</body>
</html>
